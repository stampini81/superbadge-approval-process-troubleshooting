name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate essential files and XML
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import xml.etree.ElementTree as ET

          required = [
              Path("README.md"),
              Path("LICENSE"),
              Path("sfdx-project.json"),
              Path("force-app/main/default/approvalProcesses/Research_Proposal__c.Research_Proposals_Ready_for_Review.approvalProcess-meta.xml"),
              Path("force-app/main/default/flexipages/Research_Proposal_Record_Page.flexipage-meta.xml"),
              Path("force-app/main/default/objects/Research_Proposal__c/fields/In_Review__c.field-meta.xml"),
              Path("force-app/main/default/objects/Research_Proposal__c/listViews/Proposals_In_Review.listView-meta.xml"),
              Path("force-app/main/default/queues/Research_Proposal_Approvers.queue-meta.xml"),
              Path("force-app/main/default/workflows/Research_Proposal__c.workflow-meta.xml"),
          ]

          missing = [str(p) for p in required if not p.exists()]
          if missing:
              print("Missing required files:")
              for item in missing:
                  print(f" - {item}")
              sys.exit(1)

          xml_files = sorted(Path("force-app").rglob("*.xml"))
          if not xml_files:
              print("No XML metadata files found under force-app.")
              sys.exit(1)

          for xml_file in xml_files:
              try:
                  ET.parse(xml_file)
              except ET.ParseError as exc:
                  print(f"Invalid XML: {xml_file} -> {exc}")
                  sys.exit(1)

          print(f"Validated {len(xml_files)} XML files successfully.")
          PY
